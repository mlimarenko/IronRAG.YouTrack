services:
  youtrack-connector:
    image: pipingspace/ironrag.youtrack:${YOUTRACK_CONNECTOR_TAG:-0.0.1}
    container_name: ironrag-youtrack-connector
    restart: unless-stopped
    env_file:
      - .env.local
    volumes:
      - ./routing.yaml:/app/routing.yaml:ro
      - youtrack-connector-state:/var/lib/ironrag-connector
    ports:
      - "127.0.0.1:8088:8088"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  youtrack-connector-state:
